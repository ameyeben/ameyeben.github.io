<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ASCII Loading Animation</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: transparent;
    --char-color: rgba(0,0,0,0.15);
    --char-flash: rgba(0,0,0,0.4);
    --cell: 18px;
  }

  body {
    background: #fff;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  #ascii-region {
    position: relative;
    width: min(960px, 92vw);
    height: min(480px, 55vh);
    background: #fff;
    border-radius: 6px;
    overflow: hidden;
    border: 1px solid rgba(0,0,0,0.08);
  }

  #ascii-canvas {
    position: absolute;
    inset: 0;
    display: grid;
    overflow: hidden;
  }

  .cell {
    width: var(--cell);
    height: var(--cell);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--char-color);
    user-select: none;
    opacity: 0;
  }

  .cell.revealed {
    opacity: 1;
    animation: cellFlash 0.8s ease-out forwards;
  }

  @keyframes cellFlash {
    0% { color: var(--char-flash); }
    100% { color: var(--char-color); }
  }
</style>
</head>
<body>

<div id="ascii-region">
  <div id="ascii-canvas"></div>
</div>

<script>
  var canvas = document.getElementById('ascii-canvas');
  var cells = [];
  var gridCols = 0;
  var gridRows = 0;

  var CELL_PX = 18;
  var CHUNK_X = 8;
  var CHUNK_Y = 4;
  var DELAY = 80;
  var PAUSE_MS = 1000;

  function buildCanvas() {
    canvas.innerHTML = '';
    cells = [];

    var region = document.getElementById('ascii-region');
    gridCols = Math.floor(region.clientWidth / CELL_PX);
    gridRows = Math.floor(region.clientHeight / CELL_PX);

    canvas.style.gridTemplateColumns = 'repeat(' + gridCols + ', ' + CELL_PX + 'px)';
    canvas.style.gridTemplateRows = 'repeat(' + gridRows + ', ' + CELL_PX + 'px)';

    for (var r = 0; r < gridRows; r++) {
      for (var c = 0; c < gridCols; c++) {
        var div = document.createElement('div');
        div.className = 'cell';
        div.textContent = '\u005C';
        canvas.appendChild(div);
        cells.push(div);
      }
    }
  }

  function cellAt(row, col) {
    return cells[row * gridCols + col];
  }

  function animate() {
    var chunks = [];
    for (var br = 0; br < gridRows; br += CHUNK_Y) {
      for (var bc = 0; bc < gridCols; bc += CHUNK_X) {
        chunks.push({ r: br, c: bc });
      }
    }

    var idx = 0;
    var midpoint = Math.floor(chunks.length / 2);

    function revealNext() {
      if (idx >= chunks.length) return;

      var origin = chunks[idx];
      var rEnd = Math.min(origin.r + CHUNK_Y, gridRows);
      var cEnd = Math.min(origin.c + CHUNK_X, gridCols);

      for (var r = origin.r; r < rEnd; r++) {
        for (var c = origin.c; c < cEnd; c++) {
          cellAt(r, c).classList.add('revealed');
        }
      }

      idx++;
      var nextDelay = (idx === midpoint) ? PAUSE_MS : DELAY;
      setTimeout(revealNext, nextDelay);
    }

    revealNext();
  }

  buildCanvas();
  animate();
</script>
</body>
</html>
